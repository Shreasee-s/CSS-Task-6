<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="leftpanel">
        <img src="images/washing-machine.jpg" alt="washing-machine" class="washingmachine">
    </div>
    <div class="rightpanel">  

        <section class="content">

            <section>
                <h1 id="greeting">Hello Again!</h1>
                <h3 id="welcome">Welcome back! We missed you!</h3>
            </section>
            
            <form action="" class="login-form">

                <section class="fieldbox">
                    <label for="email">Email</label>
                    <input type="email" class="box" id="email" placeholder="Emailid@site.com">
                </section>
                

                <section class="fieldbox">
                    <label for="password">Password</label>
                    <input type="password" class="box" id="password" minlength="5" maxlength="10" placeholder="Password">
                     <a href="#" class="forgotpass">Forgot Password</a>
                </section>

                <button>Login</button>

                <section>
                    <p id="register"> <span>Not a member ?</span>  <a href="#"> Register Now</a></p>
                </section>
                
            </form>
            
        </section>
            
        </div>
</body>
</html>
